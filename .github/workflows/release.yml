name: Release

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build LSP Server (${{ matrix.vscode-target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            vscode-target: win32-x64
            binary: sixu-lsp.exe
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            vscode-target: darwin-arm64
            binary: sixu-lsp
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            vscode-target: linux-x64
            binary: sixu-lsp

    steps:
      - uses: actions/checkout@v4

      - name: Build LSP server
        run: |
          cargo build --release -p sixu-lsp --target ${{ matrix.rust-target }}
          cp target/${{ matrix.rust-target }}/release/${{ matrix.binary }} sixu-vscode-extension/server/${{ matrix.binary }}

      - name: Set binary permissions
        if: matrix.vscode-target != 'win32-x64'
        run: chmod +x sixu-vscode-extension/server/${{ matrix.binary }}

      - name: Install Node.js dependencies
        run: yarn install

      - name: Build extension
        run: yarn build
        working-directory: sixu-vscode-extension

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --target ${{ matrix.vscode-target }}
        working-directory: sixu-vscode-extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.vscode-target }}
          path: sixu-vscode-extension/*.vsix

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          merge-multiple: true
          path: vsix

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: vsix/**/*

  dev-release:
    name: Update Dev Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: dev-release
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          merge-multiple: true
          path: vsix

      - name: Update dev tag
        run: |
          git tag -f dev
          git push origin dev --force

      - name: Create or update dev pre-release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          files: vsix/**/*
